version: "3.9"

services:

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    volumes:
      - ./api-gateway:/app
      - /app/node_modules
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - order-service
      - tracking-service
      - notification-service



  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5001:5001"
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    env_file:
      - ./auth-service/.env



  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "5002:5002"
    volumes:
      - ./order-service:/app
      - /app/node_modules
    env_file:
      - ./order-service/.env



  tracking-service:
    build: ./tracking-service
    container_name: tracking-service
    ports:
      - "5003:5003"
    volumes:
      - ./tracking-service:/app
      - /app/node_modules
    env_file:
      - ./tracking-service/.env



  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "5004:5004"
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    env_file:
      - ./notification-service/.env